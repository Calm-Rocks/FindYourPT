[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Branch deploy context (feature branches, not main)
[context.branch-deploy]
  command = "npm run build"
  publish = "dist"

# Deploy preview context (pull requests)
[context.deploy-preview]
  command = "npm run build"
  publish = "dist"
